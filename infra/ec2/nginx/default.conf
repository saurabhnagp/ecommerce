# Nginx site config for single-EC2 Docker Compose (mounted over the image default).
# Upstreams use Docker Compose service names on the amcart network.

upstream user_service {
    least_conn;
    keepalive 32;
    server user-service:8080 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/x-javascript;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ProductService is not deployed on single-EC2 stack — clear JSON response
    location ^~ /api/v1/products {
        default_type application/json;
        return 503 '{"success":false,"error":{"code":"NOT_DEPLOYED","message":"ProductService is not deployed on this environment."}}';
    }
    location ^~ /api/v1/brands {
        default_type application/json;
        return 503 '{"success":false,"error":{"code":"NOT_DEPLOYED","message":"ProductService is not deployed on this environment."}}';
    }
    location ^~ /api/v1/categories {
        default_type application/json;
        return 503 '{"success":false,"error":{"code":"NOT_DEPLOYED","message":"ProductService is not deployed on this environment."}}';
    }

    # UserService
    location /api/v1/auth/login {
        limit_req zone=api_auth burst=5 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }
    location /api/v1/auth/register {
        limit_req zone=api_auth burst=5 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }
    location /api/v1/auth/forgot-password {
        limit_req zone=api_auth burst=3 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }

    location /health {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
