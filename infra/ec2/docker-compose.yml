# Single-EC2 stack: Postgres + UserService + UI (nginx + SPA).
# Copy this folder to the server (e.g. /opt/amcart), add .env from .env.example, then:
#   aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
#   docker compose --env-file .env up -d
#
# CI/CD exports USER_SERVICE_IMAGE / UI_IMAGE with commit SHA before pull/up.

services:
  postgres:
    image: postgres:16-alpine
    container_name: amcart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amcart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-amcart_users}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - amcart

  user-service:
    image: ${USER_SERVICE_IMAGE:?USER_SERVICE_IMAGE is required}
    container_name: amcart-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-amcart_users};Username=${POSTGRES_USER:-amcart};Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: ${JWT_ISSUER:-amcart}
      Jwt__Audience: ${JWT_AUDIENCE:-amcart-api}
    expose:
      - "8080"
    networks:
      - amcart

  ui:
    image: ${UI_IMAGE:?UI_IMAGE is required}
    container_name: amcart-ui
    restart: unless-stopped
    depends_on:
      - user-service
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - amcart

volumes:
  postgres_data:

networks:
  amcart:
    name: amcart
