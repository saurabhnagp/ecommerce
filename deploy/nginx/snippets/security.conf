# Security headers (add_header in location/server context)
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Optional: tighten CSP when you know your app's needs
# add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
# HSTS: uncomment when using HTTPS
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
