# API gateway only: reverse proxy + load balancing + security (no static files).
upstream user_service {
    least_conn;
    keepalive 32;
    server user-service.amcart-services.svc.cluster.local:8080 max_fails=3 fail_timeout=30s;
}

upstream product_service {
    least_conn;
    keepalive 32;
    server product-service.amcart-services.svc.cluster.local:8080 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/v1/auth/login {
        limit_req zone=api_auth burst=5 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }
    location /api/v1/auth/register {
        limit_req zone=api_auth burst=5 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }
    location /api/v1/auth/forgot-password {
        limit_req zone=api_auth burst=3 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }
    # ProductService routes
    location /api/v1/products {
        limit_req zone=api_general burst=20 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://product_service;
    }
    location /api/v1/categories {
        limit_req zone=api_general burst=20 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://product_service;
    }
    location /api/v1/brands {
        limit_req zone=api_general burst=20 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://product_service;
    }
    location /api/v1/wishlist {
        limit_req zone=api_general burst=20 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://product_service;
    }
    location /api/v1/cart {
        limit_req zone=api_general burst=30 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://product_service;
    }

    # UserService catch-all for remaining /api/ routes
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }

    location /health {
        access_log off;
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service/health;
    }

    location = / {
        default_type text/plain;
        add_header X-Frame-Options "DENY" always;
        return 200 'amcart-gateway\n';
    }
}
