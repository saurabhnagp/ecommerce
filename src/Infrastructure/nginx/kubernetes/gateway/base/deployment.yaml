apiVersion: apps/v1
kind: Deployment
metadata:
  name: amcart-gateway
  namespace: amcart-gateway
  labels:
    app: amcart-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amcart-gateway
  template:
    metadata:
      labels:
        app: amcart-gateway
    spec:
      containers:
        - name: nginx
          image: amcart-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: amcart-gateway
  namespace: amcart-gateway
  labels:
    app: amcart-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: amcart-gateway
