apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: amcart-gateway:latest
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/amcart-gateway
    newTag: latest

patches:
  - path: service-patch.yaml
    target:
      kind: Service
      name: amcart-gateway
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
      name: amcart-gateway
