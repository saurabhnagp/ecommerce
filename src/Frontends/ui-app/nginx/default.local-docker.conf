# Use with Dockerfile.local — backends on host (dotnet run) or containers named user-service / product-service on same Docker network.
# UserService default: port 5001, ProductService: 5002 (host.docker.internal).

upstream user_service {
    server host.docker.internal:5001;
}

upstream product_service {
    server host.docker.internal:5002;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/x-javascript;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /api/v1/products {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://product_service;
    }
    location ^~ /api/v1/brands {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://product_service;
    }
    location ^~ /api/v1/categories {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://product_service;
    }

    location /api/v1/auth/login {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }
    location /api/v1/auth/register {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }
    location /api/v1/auth/forgot-password {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }
    location /api/ {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service;
    }

    location /health {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://user_service/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
