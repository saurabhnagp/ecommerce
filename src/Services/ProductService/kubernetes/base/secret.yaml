# Replace with your values. For production use Sealed Secrets or External Secrets.
# Connection string: Postgres in same cluster (amcart-databases namespace).
apiVersion: v1
kind: Secret
metadata:
  name: product-service-secret
  namespace: amcart-services
  labels:
    app: product-service
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres.amcart-databases.svc.cluster.local;Port=5432;Database=amcart_products;Username=amcart;Password=amcart_password"
  Jwt__Secret: "amcart-user-service-secret-key-minimum-32-characters-long-for-hs256"
