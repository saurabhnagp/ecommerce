apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: amcart-services
spec:
  replicas: 2
  template:
    spec:
      imagePullPolicy: Always
      containers:
        - name: user-service
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      # For private ECR, add: imagePullSecrets: [{ name: ecr-registry-secret }]
