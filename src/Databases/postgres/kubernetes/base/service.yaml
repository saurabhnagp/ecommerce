apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: amcart-databases
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
      protocol: TCP
  selector:
    app: postgres
---
