# Store base64-encoded password: echo -n 'amcart_password' | base64
# In production, use sealed-secrets, External Secrets, or AWS Secrets Manager.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: amcart-databases
  labels:
    app: postgres
type: Opaque
stringData:
  # Prefer stringData so values are plain text in the manifest (easier to maintain).
  # Replace with your own password in production.
  POSTGRES_USER: amcart
  POSTGRES_PASSWORD: amcart_password
  POSTGRES_DB: amcart_users
