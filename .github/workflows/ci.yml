name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  user-service:
    name: UserService (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore, build, test
        run: |
          dotnet restore src/AmCart.sln
          dotnet build src/AmCart.sln -c Release --no-restore
          dotnet test src/AmCart.sln -c Release --no-build --verbosity normal

  ui-app:
    name: ui-app (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontends/ui-app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/Frontends/ui-app/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

  dockerfile-smoke:
    name: Docker build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UserService image
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Services/UserService/Dockerfile
          push: false
          tags: user-service:ci

      - name: Build ProductService image
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Services/ProductService/Dockerfile
          push: false
          tags: product-service:ci

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: src/Frontends/ui-app
          file: src/Frontends/ui-app/Dockerfile
          push: false
          tags: ui:ci
